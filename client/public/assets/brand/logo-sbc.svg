<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" width="300" height="120">
  <!-- Saudi Business Center official logo representation -->
  <defs>
    <linearGradient id="sbcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00704A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006633;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Icon: stylized building/chart -->
  <rect x="10" y="30" width="12" height="60" fill="url(#sbcGrad)" rx="2"/>
  <rect x="26" y="50" width="12" height="40" fill="url(#sbcGrad)" rx="2"/>
  <rect x="42" y="40" width="12" height="50" fill="url(#sbcGrad)" rx="2"/>
  <rect x="58" y="20" width="12" height="70" fill="#C4A53A" rx="2"/>
  <!-- Arabic text -->
  <text x="85" y="55" font-family="Cairo, Arial, sans-serif" font-size="18" font-weight="700" fill="#1a1a1a" text-anchor="start">المركز السعودي</text>
  <text x="85" y="78" font-family="Cairo, Arial, sans-serif" font-size="18" font-weight="700" fill="#1a1a1a" text-anchor="start">للأعمال</text>
  <!-- English text -->
  <text x="85" y="98" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="start">Saudi Business Center</text>
</svg>
